name: Deploy Anna Worker

on:
  push:
    branches: [main]
    paths:
      - "anna-worker/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy anna-worker to Cloudflare
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_KEY }}
          accountId: "61dd8de53dcc6ea9ba7fab9c9581564d"
          workingDirectory: anna-worker
